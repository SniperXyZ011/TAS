version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tas_secret}
      POSTGRES_DB: ${POSTGRES_DB:-tactical_armory}
    ports:
      - "5432:5432"
    volumes:
      - tas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tas_user} -d ${POSTGRES_DB:-tactical_armory}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tas_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tas_user}:${POSTGRES_PASSWORD:-tas_secret}@postgres:5432/${POSTGRES_DB:-tactical_armory}?sslmode=disable
      SERVER_PORT: ${SERVER_PORT:-8080}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      NODE_RATE_LIMIT_RPS: ${NODE_RATE_LIMIT_RPS:-10}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENV: ${ENV:-production}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  tas_pgdata:
    driver: local
